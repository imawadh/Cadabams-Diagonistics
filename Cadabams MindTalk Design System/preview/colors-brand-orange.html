<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand orange</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .swatch { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-shadow: var(--sh-1); }
  .name { font-size: 10px; font-weight: 600; opacity: 0.85; }
  .hex { font-size: 10px; opacity: 0.7; font-family: var(--font-mono); }
  .label { font-size: 11px; color: var(--fg3); margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
  .group { margin-bottom: 18px; }
  h3 { margin: 0 0 6px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 12px; }
</style></head>
<body>
  <h3>Brand orange — primary CTA</h3>
  <p class="sub">The single loud color. Reserved for primary actions, active states, current-day pills, and brand mark. <code>--mt-orange-500</code> is the canonical CTA.</p>
  <div class="row">
    <div class="swatch" style="background:#FFF4EC;color:#6E2F08"><div class="name">50</div><div class="hex">#FFF4EC</div></div>
    <div class="swatch" style="background:#FFE4D2;color:#6E2F08"><div class="name">100</div><div class="hex">#FFE4D2</div></div>
    <div class="swatch" style="background:#FFC9A6;color:#6E2F08"><div class="name">200</div><div class="hex">#FFC9A6</div></div>
    <div class="swatch" style="background:#FFA875;color:#6E2F08"><div class="name">300</div><div class="hex">#FFA875</div></div>
    <div class="swatch" style="background:#FF8A47;color:#fff"><div class="name">400</div><div class="hex">#FF8A47</div></div>
    <div class="swatch" style="background:#F97316;color:#fff;outline:2px solid #0E1726;outline-offset:2px"><div class="name">500 ★</div><div class="hex">#F97316</div></div>
    <div class="swatch" style="background:#E8620A;color:#fff"><div class="name">600</div><div class="hex">#E8620A</div></div>
    <div class="swatch" style="background:#D8670E;color:#fff"><div class="name">700</div><div class="hex">#D8670E</div></div>
    <div class="swatch" style="background:#A8480A;color:#fff"><div class="name">800</div><div class="hex">#A8480A</div></div>
    <div class="swatch" style="background:#6E2F08;color:#fff"><div class="name">900</div><div class="hex">#6E2F08</div></div>
  </div>
</body></html>
