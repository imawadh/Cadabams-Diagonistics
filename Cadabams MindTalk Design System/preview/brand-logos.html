<!doctype html>
<html><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 0.6fr; gap: 12px; }
  .tile { border-radius: 18px; aspect-ratio: 1.6; display: flex; align-items: center; justify-content: center; padding: 24px; box-shadow: var(--sh-1); }
  .tile-cream { background: #FAF7F4; border: 1px solid #ECE6DE; }
  .tile-orange { background: #F97316; }
  .tile-dark { background: #1C2433; }
  .tile img { max-width: 100%; max-height: 60px; object-fit: contain; }
  .tile.icon img { max-height: 64px; }
  .lbl { font-size: 11px; color: var(--fg3); margin-top: 6px; text-align: center; font-family: var(--font-mono); }
</style></head>
<body>
  <h3>Logo lockups</h3>
  <p class="sub">Wordmark on cream uses the orange variant. White wordmark on dark or photographic backgrounds. White icon mark on the brand-orange tile.</p>
  <div class="grid">
    <div>
      <div class="tile tile-cream"><img src="../assets/logos/mindtalk-orange.svg" alt="MindTalk orange"></div>
      <div class="lbl">mindtalk-orange.svg · on cream</div>
    </div>
    <div>
      <div class="tile tile-dark"><img src="../assets/logos/mindtalk-white.svg" alt="MindTalk white"></div>
      <div class="lbl">mindtalk-white.svg · on dark</div>
    </div>
    <div>
      <div class="tile tile-orange icon"><img src="../assets/logos/mindtalk-icon-white.svg" alt="MindTalk icon"></div>
      <div class="lbl">mindtalk-icon-white.svg</div>
    </div>
  </div>
</body></html>
