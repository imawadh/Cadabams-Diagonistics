<!doctype html>
<html><head><meta charset="utf-8"><title>Mood faces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 14px; }
  .label { font-size: 14px; font-weight: 700; color: #0E1726; margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .face { background: #fff; border: 1px solid #ECE6DE; border-radius: 14px; padding: 12px 4px; display: flex; flex-direction: column; align-items: center; gap: 6px; box-shadow: var(--sh-1); }
  .face .e { font-size: 28px; line-height: 1; }
  .face .n { font-size: 12px; color: var(--fg2); font-weight: 600; }
  .face.active { background: #F97316; border-color: #F97316; }
  .face.active .n { color: #fff; }
</style></head>
<body>
  <h3>Mood faces — feeling input</h3>
  <p class="sub">The only place emoji is used in product UI. Selected face sits on a solid orange tile. Used on Reflection / journal write surfaces.</p>
  <div class="label">How are you feeling?</div>
  <div class="row">
    <div class="face"><span class="e">😣</span><span class="n">Awful</span></div>
    <div class="face"><span class="e">😔</span><span class="n">Bad</span></div>
    <div class="face active"><span class="e">😐</span><span class="n">Okay</span></div>
    <div class="face"><span class="e">😊</span><span class="n">Good</span></div>
    <div class="face"><span class="e">😄</span><span class="n">Great</span></div>
  </div>
</body></html>
