<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows & elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 18px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .tile { background: #fff; border-radius: 18px; aspect-ratio: 1.4; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .name { font-size: 11px; font-weight: 700; color: var(--fg1); }
  .val { font-size: 10px; color: var(--fg3); font-family: var(--font-mono); text-align: center; padding: 0 8px; }
  .glow { background: #F97316; color: #fff; }
</style></head>
<body>
  <h3>Shadow elevation system</h3>
  <p class="sub">Soft, near-black, never colored — except for the orange glow under primary CTAs and the active journey-step circle.</p>
  <div class="grid">
    <div class="tile" style="box-shadow:0 1px 2px rgba(15,23,42,.04),0 1px 1px rgba(15,23,42,.03)"><div class="name">sh-1</div><div class="val">ambient · cards on cream</div></div>
    <div class="tile" style="box-shadow:0 2px 6px rgba(15,23,42,.05),0 6px 16px rgba(15,23,42,.04)"><div class="name">sh-2</div><div class="val">standard card</div></div>
    <div class="tile" style="box-shadow:0 8px 24px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.04)"><div class="name">sh-3</div><div class="val">hero · lifted</div></div>
    <div class="tile glow" style="box-shadow:0 12px 28px rgba(249,115,22,0.28)"><div class="name">sh-glow-orange</div><div class="val" style="color:#fff;opacity:0.9">primary CTA · active step</div></div>
  </div>
</body></html>
