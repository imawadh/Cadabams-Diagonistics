<!doctype html>
<html><head><meta charset="utf-8"><title>Tab bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 18px; }
  .tabs { background: #fff; border-radius: 28px; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--sh-2); position: relative; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; }
  .tab svg { width: 22px; height: 22px; stroke: #6B7280; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tab .lbl { font-size: 11px; font-weight: 600; color: #6B7280; }
  .tab.active svg { stroke: #F97316; fill: #FFE4D2; }
  .tab.active .lbl { color: #F97316; }
  .ai-tab { width: 56px; height: 56px; background: #F97316; border-radius: 999px; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 24px rgba(249,115,22,0.32); margin: -22px 0 0; }
  .ai-tab svg { width: 28px; height: 28px; stroke: #fff; fill: #fff; }
</style></head>
<body>
  <h3>Bottom tab bar</h3>
  <p class="sub">Five tabs · Home · Explore · AI · Appts · Profile. Center AI tab is a raised orange floating circle. Active tab = orange icon + filled glyph.</p>
  <div class="tabs">
    <div class="tab active">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v10a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
      <span class="lbl">Home</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M16 8l-2 6-6 2 2-6z"/></svg>
      <span class="lbl">Explore</span>
    </div>
    <div class="ai-tab">
      <svg viewBox="0 0 24 24"><path d="M12 2l1.6 4.4L18 8l-4.4 1.6L12 14l-1.6-4.4L6 8l4.4-1.6z" stroke="none"/><path d="M19 14l.8 2.2 2.2.8-2.2.8L19 20l-.8-2.2L16 17l2.2-.8z" stroke="none"/></svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
      <span class="lbl">Appts</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg>
      <span class="lbl">Profile</span>
    </div>
  </div>
</body></html>
