<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 14px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
  .meta { width: 110px; font-size: 11px; font-family: var(--font-mono); color: var(--fg3); }
  .bar { background: #F97316; height: 16px; border-radius: 4px; }
  .label { font-size: 11px; color: var(--fg3); }
</style></head>
<body>
  <h3>Spacing scale</h3>
  <p class="sub">4-px grid. Mobile gutter is 20. Section vertical rhythm is 24. Card inner padding is typically 16–20.</p>
  <div class="row"><div class="meta">s-1 · 4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="meta">s-2 · 8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="meta">s-3 · 12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="meta">s-4 · 16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="meta">s-5 · 20 · gutter</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="meta">s-6 · 24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="meta">s-7 · 32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="meta">s-8 · 40</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="meta">s-9 · 56</div><div class="bar" style="width:56px"></div></div>
</body></html>
