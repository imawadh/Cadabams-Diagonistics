<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 10px 0; border-bottom: 1px dashed var(--mt-line); }
  .row:last-child { border: 0; }
  .lbl { width: 110px; font-size: 11px; color: var(--fg3); font-family: var(--font-mono); }
  button { font-family: inherit; font-weight: 700; cursor: pointer; border: 0; }
  .b-primary { background: #F97316; color: #fff; padding: 14px 24px; border-radius: 999px; box-shadow: 0 8px 18px rgba(249,115,22,.28); font-size: 15px; }
  .b-grad { background: linear-gradient(90deg,#F77268 0%,#F97316 100%); color: #fff; padding: 14px 28px; border-radius: 999px; font-size: 15px; box-shadow: 0 8px 18px rgba(247,114,104,.22); }
  .b-secondary { background: #fff; color: #0E1726; padding: 14px 24px; border-radius: 999px; box-shadow: var(--sh-2); font-size: 15px; }
  .b-dark { background: #1C2433; color: #fff; padding: 12px 22px; border-radius: 999px; font-size: 14px; }
  .b-ghost { background: transparent; color: #F97316; font-size: 14px; padding: 10px 14px; }
  .b-disabled { background: #F97316; color: #fff; padding: 14px 24px; border-radius: 999px; opacity: 0.4; font-size: 15px; }
  .b-press { background: #F97316; color: #fff; padding: 14px 24px; border-radius: 999px; font-size: 15px; transform: scale(0.97); box-shadow: inset 0 1px 2px rgba(15,23,42,.12); }
</style></head>
<body>
  <h3>Buttons</h3>
  <p class="sub">Fully rounded; primary CTAs carry a soft orange glow. Press shrinks to 0.97 with an inset shadow — no color flash.</p>
  <div class="row"><div class="lbl">primary</div><button class="b-primary">Book Now</button><button class="b-primary">Save Entry</button></div>
  <div class="row"><div class="lbl">primary · grad</div><button class="b-grad">Continue</button><button class="b-grad">Subscribe to Journal</button></div>
  <div class="row"><div class="lbl">secondary</div><button class="b-secondary">Sign up</button><button class="b-secondary">Browse experts</button></div>
  <div class="row"><div class="lbl">dark / chip</div><button class="b-dark">Talk to a therapist</button><button class="b-dark">All Filters</button></div>
  <div class="row"><div class="lbl">ghost / link</div><button class="b-ghost">View All</button><button class="b-ghost">View Path →</button></div>
  <div class="row"><div class="lbl">states</div><button class="b-press">Pressed</button><button class="b-disabled">Disabled</button></div>
</body></html>
