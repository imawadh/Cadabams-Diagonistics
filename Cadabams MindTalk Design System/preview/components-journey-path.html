<!doctype html>
<html><head><meta charset="utf-8"><title>Journey path</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 14px; }
  .path { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 8px 0 12px; }
  .step { width: 56px; height: 56px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-weight: 800; box-shadow: var(--sh-2); position: relative; }
  .step.done { background: #FFC9A6; color: #C9531A; }
  .step.active { background: #F97316; color: #fff; box-shadow: 0 12px 24px rgba(249,115,22,.36); width: 64px; height: 64px; }
  .step.locked { background: #F4F2EE; color: #9AA0AB; }
  .step .start { position: absolute; top: -22px; background: #fff; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 800; color: #F97316; box-shadow: var(--sh-1); white-space: nowrap; }
  .step svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body>
  <h3>Journey path — units</h3>
  <p class="sub">Vertical zig-zag of step tiles. Done = peach with check. Active = solid orange with grid glyph and orange glow + a "START" pill on top. Locked = fog with lock.</p>
  <div class="path">
    <div class="step done"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>
    <div class="step done"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>
    <div class="step done"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>
    <div class="step active"><span class="start">START</span><svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg></div>
    <div class="step locked"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
    <div class="step locked"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
  </div>
</body></html>
