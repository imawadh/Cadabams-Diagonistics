<!doctype html>
<html><head><meta charset="utf-8"><title>Therapist card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--mt-cream-bg); font-family: var(--font-sans); }
  h3 { margin: 0 0 4px; font-size: 13px; color: var(--fg1); font-weight: 700; }
  .sub { font-size: 12px; color: var(--fg3); margin: 0 0 14px; }
  .card { background: #fff; border-radius: 18px; padding: 14px; box-shadow: var(--sh-2); }
  .top { display: flex; gap: 14px; align-items: center; }
  .avatar { width: 64px; height: 64px; border-radius: 999px; background: linear-gradient(135deg,#FBB7BC,#F97316); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 22px; flex-shrink: 0; position: relative; }
  .star { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 999px; padding: 2px 6px; font-size: 11px; font-weight: 700; color: #0E1726; box-shadow: var(--sh-1); display: flex; align-items: center; gap: 2px; }
  .name { font-size: 16px; font-weight: 700; color: #0E1726; }
  .creds { font-size: 12px; color: var(--fg3); margin-top: 2px; }
  .tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tag { padding: 4px 10px; font-size: 11px; background: #F4F2EE; color: #4A5260; border-radius: 999px; font-weight: 500; }
  .bot { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid #ECE6DE; }
  .fee-l { font-size: 11px; color: var(--fg3); font-weight: 600; }
  .fee-v { font-size: 18px; font-weight: 800; color: #0E1726; }
  .cta { background: #1C2433; color: #fff; padding: 10px 18px; border-radius: 999px; font-weight: 700; font-size: 13px; }
</style></head>
<body>
  <h3>Therapist card</h3>
  <p class="sub">Trust signal — circular photo with star rating, name + credentials, specialty chips, fee, Book Now CTA.</p>
  <div class="card">
    <div class="top">
      <div class="avatar">AR<div class="star">★ 4.9</div></div>
      <div>
        <div class="name">Dr. Ananya Reddy</div>
        <div class="creds">Clinical Psychologist · M.Phil</div>
        <div class="tags">
          <span class="tag">Anxiety</span>
          <span class="tag">Depression</span>
          <span class="tag">+2</span>
        </div>
      </div>
    </div>
    <div class="bot">
      <div><div class="fee-l">SESSION FEE</div><div class="fee-v">₹1,800</div></div>
      <button class="cta" style="border:0;font-family:inherit;cursor:pointer">Book Now</button>
    </div>
  </div>
</body></html>
